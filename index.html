<script>
const P=JSON.parse(document.getElementById('payload').textContent);
const b=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlock(pass){
 const enc=new TextEncoder();
 const km=await crypto.subtle.importKey('raw',enc.encode(pass),'PBKDF2',false,['deriveKey']);
 const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b(P.salt),iterations:310000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
 const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b(P.iv)},key,b(P.data));
 const hbuf=await crypto.subtle.digest('SHA-256',enc.encode(pass));
 sessionStorage.setItem('jcc_auth',[...new Uint8Array(hbuf)].map(x=>x.toString(16).padStart(2,'0')).join(''));
 sessionStorage.setItem('jcc_pass',pass);
 const html=new TextDecoder().decode(pt);
 document.open();document.write(html);document.close();
}
document.getElementById('f').onsubmit=async ev=>{ev.preventDefault();
 try{await unlock(document.getElementById('p').value)}
 catch(_){document.getElementById('e').textContent='Incorrect passcode.'}};
const saved=sessionStorage.getItem('jcc_pass');
if(saved)unlock(saved).catch(()=>{sessionStorage.removeItem('jcc_pass');document.getElementById('p').focus()});
else document.getElementById('p').focus();
</script>
</body></html>
